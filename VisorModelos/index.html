<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisorModelos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="viewer-shell">
    <header class="viewer-toolbar">
      <div class="viewer-copy">
        <h1>VisorModelos</h1>
        <p>Abre un modelo y mu&eacute;velo con el rat&oacute;n.</p>
      </div>
      <div class="viewer-actions">
        <input
          id="model-file-input"
          type="file"
          accept=".glb,.gltf,.obj,.fbx,.stl,.ply,model/gltf-binary,model/gltf+json"
          hidden
        >
        <button id="load-model-button" type="button">Cargar modelo</button>
      </div>
    </header>

    <section class="viewer-stage-card">
      <div class="viewer-stage-meta">
        <span id="viewer-status">Listo para cargar un modelo.</span>
        <span id="viewer-format">Formatos: GLB, GLTF, OBJ, FBX, STL, PLY</span>
      </div>
      <div id="viewer-canvas-wrap" class="viewer-canvas-wrap"></div>
    </section>
  </div>

  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
