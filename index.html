<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple 3D Creator</title>
  
  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui-stack">
    <div id="ui-overlay" class="glass-panel">
      <h1>Simple 3D Creator</h1>
      <p class="subtitle">Dibuja en 3D usando las flechas del teclado.</p>

      <div id="stats-panel" class="stats-panel">
        <div class="stat-row">
          <span class="stat-label">Caras</span>
          <span id="stat-faces" class="stat-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Vertices</span>
          <span id="stat-vertices" class="stat-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Puntos</span>
          <span id="stat-points" class="stat-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Lineas</span>
          <span id="stat-lines" class="stat-value">0</span>
        </div>
      </div>
      <div class="status">
        Coordenadas: <span id="coordinates-display">X: 0, Y: 0, Z: 0</span>
      </div>
    </div>

    <div id="ui-actions" class="actions-panel">
      <div class="control-panel">
        <div class="control-title">Tipo de control</div>
        <label class="radio-option">
          <input type="radio" name="control-mode" value="lines" checked>
          <span>Lineas</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="control-mode" value="points">
          <span>Puntos</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="control-mode" value="blocks-keyboard">
          <span>Bloques (teclado)</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="control-mode" value="blocks-mouse">
          <span>Bloques (raton)</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="control-mode" value="select-face">
          <span>Seleccionar cara</span>
        </label>
      </div>
      <button id="cleanup-lines-button" class="action-button" type="button">
        Eliminar lineas sin cara
      </button>
      <button id="clear-point-selection-button" class="action-button secondary" type="button" disabled>
        Deseleccionar puntos
      </button>

      <div id="texture-manager" class="texture-panel" style="display: none;">
        <div class="control-title">Gestor de Texturas</div>
        <div class="texture-upload-row">
          <input type="file" id="texture-upload-input" accept="image/*" style="display: none;">
          <button id="texture-upload-btn" class="action-button secondary" type="button">Cargar Textura</button>
        </div>
        <div id="texture-list" class="texture-list">
          <!-- Texture items will be added here -->
        </div>
        <button id="apply-texture-btn" class="action-button primary" type="button" disabled>
          Aplicar Textura
        </button>
        <label class="checkbox-option">
          <input type="checkbox" id="joint-face-checkbox" checked>
          <span>Seleccionar cara conjunta</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Import maps polyfill for ES modules (required by Three.js OrbitControls sometimes) -->
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!-- Main logic -->
  <script type="module" src="script.js"></script>
</body>
</html>
